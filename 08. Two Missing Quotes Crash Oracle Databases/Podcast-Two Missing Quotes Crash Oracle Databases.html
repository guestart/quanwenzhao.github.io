<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast - Two Missing Quotes Crash Oracle Databases !</title>
    <style>
        :root {
            --primary: #f80000;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --text-dim: #b0b0b0;
            --disabled: #444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            padding: 2.5rem;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
        }
        .header { margin-bottom: 2rem; }
        .podcast-art {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #f80000, #4a0000);
            margin: 0 auto 1.5rem;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            box-shadow: 0 10px 30px rgba(248, 0, 0, 0.25);
        }
        .controls { display: flex; flex-direction: column; gap: 2rem; }
        .main-controls { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 1.5rem; 
        }
        .btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 1.8rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
        }
        .btn:hover:not(:disabled) { transform: scale(1.15); color: var(--primary); }
        
        .play-btn { 
            width: 84px;
            height: 84px;
            background: var(--disabled);
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            cursor: not-allowed;
            opacity: 0.6;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            border: none;
            transition: all 0.3s ease;
        }
        
        .play-btn.active {
            background: var(--primary);
            box-shadow: 0 4px 15px rgba(248, 0, 0, 0.4);
            cursor: pointer;
            opacity: 1;
        }

        .play-btn.active:hover { 
            background: #ff1a1a;
            box-shadow: 0 6px 20px rgba(248, 0, 0, 0.5);
            transform: scale(1.05);
        }

        .icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px; 
            height: 30px; 
            position: relative;
        }

        /* Triangle path height calibrated to exactly 30px with stroke */
        .svg-play {
            width: 30px;
            height: 30px;
            fill: white;
            stroke: white;
            stroke-width: 3.5;
            stroke-linejoin: round;
            margin-left: 6px; 
        }

        .icon-pause {
            display: none;
            gap: 8px;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 30px;
        }
        
        /* Pause bars height matched exactly to 30px */
        .pause-bar {
            width: 10px;
            height: 30px;
            background: white;
            border-radius: 4px;
        }

        .play-btn.playing .svg-play { display: none; }
        .play-btn.playing .icon-pause { display: flex; }
        
        .progress-container { 
            width: 100%; 
            height: 6px; 
            background: #333; 
            border-radius: 3px; 
            cursor: pointer; 
            position: relative; 
        }
        .progress-bar { 
            height: 100%; 
            background: var(--primary); 
            border-radius: 3px; 
            width: 0%; 
        }
        .time-display { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.85rem; 
            color: var(--text-dim); 
            margin-top: 10px;
            font-variant-numeric: tabular-nums;
            font-weight: 500;
        }
        
        .upload-area {
            margin-top: 2rem;
            padding: 20px;
            border: 2px dashed #333;
            border-radius: 16px;
            transition: all 0.2s;
        }
        .upload-area.active {
            border-color: var(--primary);
            background: rgba(248, 0, 0, 0.05);
        }
        .upload-label {
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-dim);
            display: block;
        }
        .upload-label strong { color: var(--text); display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="podcast-art">🎙️</div>
        <h1 style="margin:0 0 8px 0; font-size: 1.5rem; line-height: 1.2;">Two Missing Quotes Crash Oracle Databases !</h1>
        <p style="color: var(--text-dim); margin: 0; font-size: 0.85rem; letter-spacing: 0.5px;">Oracle Knowledge Skills • Episode • 08</p>
    </div>

    <div class="controls">
        <div>
            <div class="progress-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="time-display">
                <span id="current-time">0:00</span>
                <span id="duration">4:44</span>
            </div>
        </div>

        <div class="main-controls">
            <button class="btn" id="rewind-btn" onclick="skip(-15)" title="Rewind 15s" disabled>⏮</button>
            <button class="btn play-btn" id="play-btn" onclick="togglePlay()" disabled>
                <div class="icon-wrapper">
                    <svg class="svg-play" viewBox="0 0 24 24">
                        <path d="M7.5 4.5V19.5L18.5 12L7.5 4.5Z" />
                    </svg>
                    <div class="icon-pause">
                        <div class="pause-bar"></div>
                        <div class="pause-bar"></div>
                    </div>
                </div>
            </button>
            <button class="btn" id="forward-btn" onclick="skip(15)" title="Forward 15s" disabled>⏭</button>
        </div>
    </div>

    <div id="upload-box" class="upload-area">
        <label for="file-upload" class="upload-label">
            <strong>Ready to listen?</strong>
            <span id="upload-text">Upload the episode audio (MP3/M4A)</span>
        </label>
        <input type="file" id="file-upload" accept=".m4a,.mp3" style="display:none;" onchange="handleUpload(event)">
    </div>
</div>

<audio id="audio-player">
    <source src="" type="audio/mpeg">
</audio>

<script>
    const audio = document.getElementById('audio-player');
    const playBtn = document.getElementById('play-btn');
    const rewindBtn = document.getElementById('rewind-btn');
    const forwardBtn = document.getElementById('forward-btn');
    const progressBar = document.getElementById('progress-bar');
    const progressContainer = document.getElementById('progress-container');
    const currentTimeEl = document.getElementById('current-time');
    const durationEl = document.getElementById('duration');
    const uploadBox = document.getElementById('upload-box');
    const uploadText = document.getElementById('upload-text');

    let isPlaying = false;
    let animationFrameId = null;

    function togglePlay() {
        if (!audio.src || audio.src === window.location.href) return;

        if (audio.paused) {
            audio.play().catch(e => console.error("Playback failed", e));
            playBtn.classList.add('playing');
            isPlaying = true;
            startProgressLoop();
        } else {
            audio.pause();
            playBtn.classList.remove('playing');
            isPlaying = false;
            cancelAnimationFrame(animationFrameId);
        }
    }

    function startProgressLoop() {
        const update = () => {
            if (!isPlaying) return;
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = percent + '%';
                currentTimeEl.innerText = formatTime(audio.currentTime);
            }
            animationFrameId = requestAnimationFrame(update);
        };
        update();
    }

    audio.onloadedmetadata = () => {
        durationEl.innerText = formatTime(audio.duration);
    };

    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    function skip(seconds) {
        if (!audio.src || audio.src === window.location.href) return;
        audio.currentTime += seconds;
        if (!isPlaying) {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = percent + '%';
            currentTimeEl.innerText = formatTime(audio.currentTime);
        }
    }

    function handleUpload(event) {
        const file = event.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            audio.src = url;
            audio.load();
            
            playBtn.disabled = false;
            rewindBtn.disabled = false;
            forwardBtn.disabled = false;
            playBtn.classList.add('active');
            
            uploadBox.classList.add('active');
            uploadText.innerText = "Loaded: " + file.name;

            audio.oncanplay = () => {
                if (!isPlaying) togglePlay();
            };
        }
    }

    progressContainer.onclick = (e) => {
        if (audio.duration && audio.src && audio.src !== window.location.href) {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            audio.currentTime = (clickX / width) * audio.duration;
            if (!isPlaying) {
                progressBar.style.width = (clickX / width * 100) + '%';
                currentTimeEl.innerText = formatTime(audio.currentTime);
            }
        }
    };
</script>
</body>
</html>
